# ============================================================
# In-Car Multi-Speaker ASR - Demo Configuration
# Optimized for low-latency interactive demo (Streamlit)
# ============================================================

# Override defaults for demo mode
defaults:
  - default

audio:
  sample_rate: 16000
  n_channels: 4
  chunk_size_sec: 2.0
  chunk_overlap_sec: 0.1

separation:
  model: "sepformer-wsj02mix"
  model_hub: "speechbrain/sepformer-wsj02mix"
  n_speakers: 2
  device: "cuda"
  si_snri_threshold: 3.0
  use_chunked: true

# Demo uses whisper-small for speed
asr:
  model: "openai/whisper-small"
  language: "zh"
  task: "transcribe"
  device: "cuda"
  beam_size: 1               # Greedy decoding for max speed
  batch_size: 1
  max_new_tokens: 128        # Short in-car commands
  return_timestamps: false   # Disable for speed

speaker:
  method: "rule"             # Use fast rule-based for demo
  driver_channel: 0

intent:
  keyword_config: "configs/intent_keywords.yaml"

# Demo-specific UI settings
demo:
  sample_audio_dir: "data/dev/wav"
  default_sample: null       # If null, show first available
  max_display_rows: 20       # Max rows in transcript table
  auto_play: false
  show_confidence: true
  show_waveform: true
  refresh_interval_ms: 500   # UI refresh interval
